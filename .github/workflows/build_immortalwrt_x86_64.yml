name: "Build Packages"

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Build target
        required: true
        type: choice
        default: all
        options:
          - all
          - "24.10"
          - "25.12"
      packages:
        description: Optional package list separated by spaces; empty builds all packages in this repo
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        shell: bash
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          set -euo pipefail

          case "${CHANNEL}" in
            all)
              matrix='{"include":[{"label":"24.10","sdk_tag":"x86_64-openwrt-24.10","expected_ext":"ipk"},{"label":"25.12","sdk_tag":"x86_64-openwrt-25.12","expected_ext":"apk"}]}'
              ;;
            24.10)
              matrix='{"include":[{"label":"24.10","sdk_tag":"x86_64-openwrt-24.10","expected_ext":"ipk"}]}'
              ;;
            25.12)
              matrix='{"include":[{"label":"25.12","sdk_tag":"x86_64-openwrt-25.12","expected_ext":"apk"}]}'
              ;;
            *)
              echo "::error::Unsupported channel: ${CHANNEL}"
              exit 1
              ;;
          esac

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build x86_64-${{ matrix.label }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: ${{ matrix.sdk_tag }}
          FEEDNAME: packages_ci
          PACKAGES: ${{ github.event.inputs.packages }}
          BUILD_LOG: 1
          INDEX: 1
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          V: s

      - name: Collect artifacts
        id: artifacts
        shell: bash
        env:
          REQUESTED_PACKAGES: ${{ github.event.inputs.packages }}
        run: |
          set -euo pipefail

          feed_dir="bin/packages/x86_64/packages_ci"
          artifact_dir="${RUNNER_TEMP}/artifacts/${{ matrix.label }}"
          requested_packages="${REQUESTED_PACKAGES:-ALL}"

          if [[ ! -d "${feed_dir}" ]]; then
            echo "::error::Expected feed output directory not found: ${feed_dir}"
            find bin -maxdepth 4 -type d | sort || true
            exit 1
          fi

          expected_count="$(find "${feed_dir}" -maxdepth 1 -type f -name "*.${{ matrix.expected_ext }}" | wc -l)"
          if [[ "${expected_count}" -eq 0 ]]; then
            echo "::error::No .${{ matrix.expected_ext }} packages were produced for x86_64-${{ matrix.label }}."
            find "${feed_dir}" -maxdepth 1 -type f | sort || true
            exit 1
          fi

          mkdir -p "${artifact_dir}"
          cp -a "${feed_dir}/." "${artifact_dir}/"

          (
            cd "${artifact_dir}"
            find . -maxdepth 1 -type f | sort > FILES.txt
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          {
            echo "target=${{ matrix.label }}"
            echo "sdk_tag=${{ matrix.sdk_tag }}"
            echo "expected_ext=${{ matrix.expected_ext }}"
            echo "packages=${requested_packages}"
          } > "${artifact_dir}/build-info.txt"

          echo "artifact_dir=${artifact_dir}" >> "$GITHUB_OUTPUT"

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt-x86_64-${{ matrix.label }}
          path: ${{ steps.artifacts.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt-x86_64-${{ matrix.label }}-logs
          path: logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        shell: bash
        env:
          REQUESTED_PACKAGES: ${{ github.event.inputs.packages }}
        run: |
          requested_packages="${REQUESTED_PACKAGES:-ALL}"

          {
            echo "## ImmortalWrt x86_64 build"
            echo ""
            echo "- Target: \`x86_64-${{ matrix.label }}\`"
            echo "- SDK image: \`immortalwrt/sdk:${{ matrix.sdk_tag }}\`"
            echo "- Expected package type: \`${{ matrix.expected_ext }}\`"
            echo "- Packages: \`${requested_packages}\`"
          } >> "$GITHUB_STEP_SUMMARY"
