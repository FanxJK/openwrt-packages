name: "Build Package x86_64"

on:
  workflow_dispatch:
    inputs:
      packages:
        description: Optional package list separated by spaces; empty builds all packages in this repo
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

permissions:
  contents: read

jobs:
  build:
    name: Build x86_64-25.12
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: |
            /opt/openwrt-sdk-x86_64-openwrt-25.12
            dl
          key: openwrt-sdk-x86_64-openwrt-25.12-${{ hashFiles('.github/workflows/build_pakcage_x86_64.yml') }}
          restore-keys: |
            openwrt-sdk-x86_64-openwrt-25.12-

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: packages_ci
          PACKAGES: ${{ github.event.inputs.packages }}
          BUILD_LOG: 1
          INDEX: 1
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          V: s

      - name: Collect artifacts
        id: artifacts
        shell: bash
        env:
          REQUESTED_PACKAGES: ${{ github.event.inputs.packages }}
        run: |
          set -euo pipefail

          feed_dir="bin/packages/x86_64/packages_ci"
          artifact_dir="${RUNNER_TEMP}/artifacts/25.12"
          requested_packages="${REQUESTED_PACKAGES:-ALL}"

          if [[ ! -d "${feed_dir}" ]]; then
            echo "::error::Expected feed output directory not found: ${feed_dir}"
            find bin -maxdepth 4 -type d | sort || true
            exit 1
          fi

          expected_count="$(find "${feed_dir}" -maxdepth 1 -type f -name "*.apk" | wc -l)"
          if [[ "${expected_count}" -eq 0 ]]; then
            echo "::error::No .apk packages were produced for x86_64-25.12."
            find "${feed_dir}" -maxdepth 1 -type f | sort || true
            exit 1
          fi

          mkdir -p "${artifact_dir}"
          cp -a "${feed_dir}/." "${artifact_dir}/"

          (
            cd "${artifact_dir}"
            find . -maxdepth 1 -type f | sort > FILES.txt
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          {
            echo "target=25.12"
            echo "sdk_tag=x86_64-openwrt-25.12"
            echo "expected_ext=apk"
            echo "packages=${requested_packages}"
          } > "${artifact_dir}/build-info.txt"

          echo "artifact_dir=${artifact_dir}" >> "$GITHUB_OUTPUT"

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt-x86_64-25.12
          path: ${{ steps.artifacts.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt-x86_64-25.12-logs
          path: logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        shell: bash
        env:
          REQUESTED_PACKAGES: ${{ github.event.inputs.packages }}
        run: |
          requested_packages="${REQUESTED_PACKAGES:-ALL}"

          {
            echo "## ImmortalWrt x86_64 package build"
            echo ""
            echo "- Target: \`x86_64-25.12\`"
            echo "- SDK image: \`immortalwrt/sdk:x86_64-openwrt-25.12\`"
            echo "- Expected package type: \`apk\`"
            echo "- Packages: \`${requested_packages}\`"
          } >> "$GITHUB_STEP_SUMMARY"
